name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.2'

jobs:
  determine-run:
    name: Check if build should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      skip_reason: ${{ steps.check.outputs.skip_reason }}
    steps:
      - name: Check commit message for skip ci
        id: check
        run: |
          if [[ "${{ github.event.head_commit.message }}" =~ "\[skip ci\]" ]] || \
             [[ "${{ github.event.commits[0].message }}" =~ "\[skip ci\]" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "skip_reason=Commit contains [skip ci]" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Debug APK
    needs: determine-run
    if: needs.determine-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
    
    - name: Build with Gradle (Release)
      if: github.ref == 'refs/heads/main'
      run: gradle assembleRelease --no-daemon --stacktrace
    
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk-${{ github.run_number }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

  test:
    name: Run Unit Tests
    needs: determine-run
    if: needs.determine-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Run unit tests
      run: gradle test --no-daemon
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-${{ github.run_number }}
        path: app/build/reports/tests/testDebugUnitTest
        retention-days: 7

  lint:
    name: Run Lint Analysis
    needs: determine-run
    if: needs.determine-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Run lint
      run: gradle lint --no-daemon
    
    - name: Upload lint reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports-${{ github.run_number }}
        path: app/build/reports/lint-results-debug.html
        retention-days: 7

  skip-notification:
    name: Skip Notification
    needs: determine-run
    if: needs.determine-run.outputs.should_run == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Log skip reason
        run: echo "Build skipped: ${{ needs.determine-run.outputs.skip_reason }}"
