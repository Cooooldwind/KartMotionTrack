name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.2'
  APP_VERSION_NAME: '1.3'
  APP_VERSION_CODE: '4'
  APP_ID: 'com.karttracker'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
    
    - name: Build Release APK
      if: github.ref == 'refs/heads/main'
      run: gradle assembleRelease --no-daemon --stacktrace
    
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Run Unit Tests
      run: gradle test --no-daemon
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: app/build/reports/tests/testDebugUnitTest
        retention-days: 7
    
    - name: Run Lint
      run: gradle lint --no-daemon
    
    - name: Upload lint reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: app/build/reports/lint-results-debug.html
        retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release-apk
        path: ./release
    
    - name: Generate Release Notes
      id: release_info
      run: |
        VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
        
        CHANGELOG=$(git log --oneline -10)
        
        cat > release_notes.md << 'RELEASE_EOF'
        ## Changes in v${VERSION_NAME}
        
        ```bash
        ${CHANGELOG}
        ```
        
        ### Downloads
        - **Release APK**: app-release.apk
        
        ### Installation
        1. Download the APK below
        2. Enable 'Install from unknown sources' in settings
        3. Open the APK to install
        RELEASE_EOF
        
        sed -i "s/\${VERSION_NAME}/$VERSION_NAME/g" release_notes.md
        sed -i "s/\${CHANGELOG}/$CHANGELOG/g" release_notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          ./release/app-release.apk
        tag_name: v${{ steps.release_info.outputs.VERSION_NAME }}
        release_name: KartMotionTrack v${{ steps.release_info.outputs.VERSION_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  packages:
    name: Publish to GitHub Packages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release-apk
        path: ./release
    
    - name: Get Version Info
      id: version
      run: |
        VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
    
    - name: Create Package Version
      env:
        VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
      run: |
        echo "GitHub Packages Publishing"
        echo "========================="
        echo "Package: KartMotionTrack"
        echo "Version: $VERSION_NAME"
        echo "Repository: ${{ github.repository }}"
        echo ""
        echo "APK Location: ./release/app-release.apk"
        echo ""
        echo "Note: GitHub Packages is primarily for libraries. For APK distribution,"
        echo "we use GitHub Releases instead."
        echo ""
        echo "For Android library (.aar) publishing to GitHub Packages:"
        echo "1. Configure maven-publish plugin"
        echo "2. Set up package registration"
        echo "3. Publish using gradle publish task"

  summary:
    name: Build Summary
    needs: [build, release, packages]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Summary
      run: |
        echo "# KartMotionTrack CI/CD Summary"
        echo ""
        echo "## Build Status"
        echo "- Build: ${{ needs.build.result }}"
        echo "- Release: ${{ needs.release.result }}"
        echo "- Packages: ${{ needs.packages.result }}"
        echo ""
        echo "## Version Info"
        echo "- Version Name: v1.3"
        echo "- Version Code: 4"
        echo ""
        echo "## Outputs"
        echo "- Debug APK: Available in artifacts (7 days)"
        echo "- Release APK: Available in artifacts (30 days) and GitHub Release"
        echo ""
        if [ "${{ github.ref }}" == "refs/heads/main" ]; then
          echo "## GitHub Release"
          echo "- Created: https://github.com/${{ github.repository }}/releases"
        fi
