name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.2'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          echo "Generating debug.keystore..."
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
        ls -la ~/.android/
    
    - name: Build Release APK
      run: gradle assembleRelease --no-daemon --stacktrace
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: KartMotionTrack
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Run Unit Tests
      run: gradle test --no-daemon
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: app/build/reports/tests/testDebugUnitTest
        retention-days: 7
    
    - name: Run Lint
      run: gradle lint --no-daemon
    
    - name: Upload lint reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: app/build/reports/lint-results-debug.html
        retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: KartMotionTrack
        path: ./release
    
    - name: Verify APK exists
      run: |
        ls -la ./release/
        if [ ! -f ./release/app-release.apk ]; then
          echo "ERROR: APK not found!"
          exit 1
        fi
    
    - name: Get Version Info
      id: version
      run: |
        VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "APK_NAME=KartMotionTrack-v${VERSION_NAME}.apk" >> $GITHUB_OUTPUT
    
    - name: Rename APK
      run: |
        mv ./release/app-release.apk ./release/KartMotionTrack-v${{ steps.version.outputs.VERSION_NAME }}.apk
        ls -la ./release/
    
    - name: Generate Release Notes
      run: |
        VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
        VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
        CHANGELOG=$(git log --oneline -10)
        
        cat > release_notes.md << EOF
## Changes in v${VERSION_NAME}

### Commits

\`\`\`bash
${CHANGELOG}
\`\`\`

### Downloads
- **KartMotionTrack-v${VERSION_NAME}.apk**: Ready to install

### Installation
1. Download the APK below
2. Enable 'Install from unknown sources' in settings
3. Open the APK to install

### Build Info
- Version Name: ${VERSION_NAME}
- Version Code: ${VERSION_CODE}
- Build Date: $(date '+%Y-%m-%d %H:%M:%S')
EOF
        
        cat release_notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          ./release/KartMotionTrack-v${{ steps.version.outputs.VERSION_NAME }}.apk
        tag_name: v${{ steps.version.outputs.VERSION_NAME }}
        release_name: KartMotionTrack v${{ steps.version.outputs.VERSION_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Summary
      run: |
        echo "# KartMotionTrack CI/CD Summary"
        echo ""
        echo "## Build Status"
        echo "| Job | Status |"
        echo "|-----|--------|"
        echo "| Build | ${{ needs.build.result }} |"
        echo "| Release | ${{ needs.release.result }} |"
        echo ""
        echo "## Artifacts"
        echo "- Release APK: 30 days retention"
        echo ""
        if [ "${{ github.ref }}" == "refs/heads/main" ]; then
          echo "## GitHub Release"
          echo "- Created: https://github.com/${{ github.repository }}/releases"
        fi
