name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - '*.gradle*'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  GRADLE_VERSION: '8.2'

jobs:
  check-build-type:
    name: Check Build Type
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.check.outputs.build_type }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check commit message
      id: check
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        echo "Commit message: $COMMIT_MSG"
        
        if echo "$COMMIT_MSG" | grep -qi "\[debug\]"; then
          echo "build_type=debug" >> $GITHUB_OUTPUT
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "Building debug APK"
        elif echo "$COMMIT_MSG" | grep -qi "\[release\]"; then
          echo "build_type=release" >> $GITHUB_OUTPUT
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "Building release APK"
        else
          echo "build_type=none" >> $GITHUB_OUTPUT
          echo "should_build=false" >> $GITHUB_OUTPUT
          echo "Skipping build (no [debug] or [release] tag)"
        fi

  build-debug:
    name: Build Debug APK
    needs: check-build-type
    if: needs.check-build-type.outputs.should_build == 'true' && needs.check-build-type.outputs.build_type == 'debug'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          echo "Generating debug.keystore..."
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
        ls -la ~/.android/
    
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: KartMotionTrack-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Run Unit Tests
      run: gradle test --no-daemon
    
    - name: Run Lint
      run: gradle lint --no-daemon

  build-release:
    name: Build Release APK
    needs: check-build-type
    if: needs.check-build-type.outputs.should_build == 'true' && needs.check-build-type.outputs.build_type == 'release'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: ${{ env.GRADLE_VERSION }}
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        if [ ! -f ~/.android/debug.keystore ]; then
          echo "Generating debug.keystore..."
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
        ls -la ~/.android/
    
    - name: Build Release APK
      run: gradle assembleRelease --no-daemon --stacktrace
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: KartMotionTrack-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Run Unit Tests
      run: gradle test --no-daemon
    
    - name: Run Lint
      run: gradle lint --no-daemon

  release:
    name: Create GitHub Release
    needs: build-release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: KartMotionTrack-release
        path: ./release
    
    - name: Verify APK exists
      run: |
        ls -la ./release/
        if [ ! -f ./release/app-release.apk ]; then
          echo "ERROR: APK not found!"
          exit 1
        fi
    
    - name: Get Version Info
      id: version
      run: |
        VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
        VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "APK_NAME=KartMotionTrack-v${VERSION_NAME}.apk" >> $GITHUB_OUTPUT
    
    - name: Rename APK
      run: |
        mv ./release/app-release.apk ./release/KartMotionTrack-v${{ steps.version.outputs.VERSION_NAME }}.apk
        ls -la ./release/
    
    - name: Generate Release Notes
      run: |
        VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
        VERSION_CODE="${{ steps.version.outputs.VERSION_CODE }}"
        CHANGELOG=$(git log --oneline -10)
        CODE_BLOCK="\`\`\`"
        
        {
          echo "## Changes in v${VERSION_NAME}"
          echo ""
          echo "### Commits"
          echo ""
          echo "${CODE_BLOCK}bash"
          echo "${CHANGELOG}"
          echo "${CODE_BLOCK}"
          echo ""
          echo "### Downloads"
          echo "- **KartMotionTrack-v${VERSION_NAME}.apk**: Ready to install"
          echo ""
          echo "### Installation"
          echo "1. Download the APK below"
          echo "2. Enable 'Install from unknown sources' in settings"
          echo "3. Open the APK to install"
          echo ""
          echo "### Build Info"
          echo "- Version Name: ${VERSION_NAME}"
          echo "- Version Code: ${VERSION_CODE}"
          echo "- Build Date: $(date '+%Y-%m-%d %H:%M:%S')"
        } > release_notes.md
        
        cat release_notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          ./release/KartMotionTrack-v${{ steps.version.outputs.VERSION_NAME }}.apk
        tag_name: v${{ steps.version.outputs.VERSION_NAME }}
        release_name: KartMotionTrack v${{ steps.version.outputs.VERSION_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  skip-notification:
    name: Build Skipped
    needs: check-build-type
    if: needs.check-build-type.outputs.should_build == 'false'
    runs-on: ubuntu-latest
    
    steps:
    - name: Skip notification
      run: |
        echo "Build skipped - no [debug] or [release] tag found in commit message"
        echo "To trigger a build, include [debug] or [release] in your commit message"
        echo ""
        echo "Examples:"
        echo "- 'feat: add new feature [debug]'"
        echo "- 'fix: bug fix [release]'"
